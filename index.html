<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>MIR – Einsatz</title>
  <style>
    body {
      background: #000;
      color: #0f0;
      font-family: monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    .mir-core {
      border: 1px solid #0f0;
      padding: 20px 30px;
    }
  </style>
</head>
<body>
  <div class="mir-core">
    <div>MIR: <span id="mir-flag">False</span></div>
    <div>Move: <span id="mir-move">idle</span></div>
  </div>

  <script>
    function mirEinsatz() {
      const mir = true;
      const move = "gesetzt";

      document.getElementById("mir-flag").textContent = mir;
      document.getElementById("mir-move").textContent = move;
    }

    mirEinsatz();
  </script>
</body>
</html>
